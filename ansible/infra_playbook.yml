---

- name: Setup dns servers
  hosts: dns_group
  become: true
  roles:
    - { role: apt_upgrade, tags: ['apt_upgrade'] }
    - { role: common, tags: ['common'] }
    - { role: pihole, tags: ['pihole'] }
    - { role: keepalived_pihole, tags: ['pihole', 'keepalived'] }

- name: Setup lxc "tang"
  hosts: tang
  become: true
  roles:
    - { role: apt_upgrade, tags: ['apt_upgrade'] }
    - { role: common, tags: ['common'] }
    - { role: tang, tags: ['tang'] }
