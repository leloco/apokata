name: "Infrastructure Deployment"

env:
  OPENTOFU_WORKING_DIR: "./opentofu/infra"
  ANSIBLE_WORKING_DIR: "./ansible"
  WORKFLOW_NOTIFIER_WORKING_DIR: "./scripts/workflow-notifier"
  OPENTOFU_VERSION: 1.10.7

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: terraform-state
  cancel-in-progress: false

jobs:
  validate_deploy:
    name: "Validate & Deploy Infrastructure"
    runs-on: [self-hosted, linux]
    timeout-minutes: 10
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Start Timer
        run: echo "WORKFLOW_START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build Notifier
        working-directory: ${{ env.WORKFLOW_NOTIFIER_WORKING_DIR }}
        run: go build -o workflow-notifier .

      - name: Decrypt Secrets
        uses: ./.github/actions/decrypt-secrets
        with:
          gpg_key: ${{ secrets.GPG_KEY }}

      - name: Setup Ansible Tools
        uses: ./.github/actions/install-ansible
        with:
          ansible_vault_password: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}

      - name: Setup OpenTofu Tools
        uses: ./.github/actions/opentofu-prep
        with:
          ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Install OpenTofu CLI
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.OPENTOFU_VERSION }}

      - name: Lint Ansible
        working-directory: ${{ env.ANSIBLE_WORKING_DIR }}
        run: ansible-lint infra_playbook.yml --force-color

      - name: OpenTofu Init
        working-directory: ${{ env.OPENTOFU_WORKING_DIR }}
        run: tofu init

      - name: OpenTofu Plan
        working-directory: ${{ env.OPENTOFU_WORKING_DIR }}
        run: tofu plan -no-color -out=main.tfplan

      # --- DEPLOY (Only when push event on main happens) ---

      - name: OpenTofu Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ env.OPENTOFU_WORKING_DIR }}
        run: tofu apply -auto-approve -lock=false main.tfplan

      - name: Install SSH Private Key
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: "unnecessary"
          if_key_exists: fail

      - name: Run Ansible Playbook
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ env.ANSIBLE_WORKING_DIR }}
        run: |
          export ANSIBLE_HOST_KEY_CHECKING=False
          ansible-playbook -i inventory.ini infra_playbook.yml

      - name: Send XMPP Notification
        if: always()
        working-directory: ${{ env.WORKFLOW_NOTIFIER_WORKING_DIR }}
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || github.event.pull_request.title || 'Unknown' }}
          STATUS: ${{ job.status }}
          WORKFLOW_START_TIME: ${{ env.WORKFLOW_START_TIME }}

          XMPP_SERVER: ${{ secrets.XMPP_SERVER }}
          XMPP_USER: ${{ secrets.XMPP_USER }}
          XMPP_PASSWORD: ${{ secrets.XMPP_PASSWORD }}
          XMPP_ROOM: ${{ secrets.XMPP_ROOM }}

          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          ./workflow-notifier || echo "Warning: NOTIFICATION NOT SENT"
